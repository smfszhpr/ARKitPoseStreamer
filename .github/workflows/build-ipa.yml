name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'ARKitPoseStreamer/**'
      - 'ARKitPoseStreamer.xcodeproj/**'
      - '.github/workflows/build-ipa.yml'

jobs:
  build:
    # macos-15 ships Xcode 16, required to parse this project (pbxproj
    # objectVersion = 77 + PBXFileSystemSynchronizedRootGroup are Xcode 16+).
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          ls /Applications | grep -i Xcode || true
          # Pick the highest-versioned Xcode app available on the runner.
          LATEST=$(ls /Applications | grep -E '^Xcode(_[0-9.]+)?\.app$' | sort -V | tail -n 1)
          echo "Selecting: $LATEST"
          sudo xcode-select -s "/Applications/$LATEST/Contents/Developer"

      - name: Diagnostics — Xcode / SDK / schemes / targets
        run: |
          echo "=== Xcode version ==="
          xcodebuild -version
          echo
          echo "=== Available iOS SDKs ==="
          xcodebuild -showsdks | grep -i iphoneos || true
          echo
          echo "=== Project info (schemes & targets) ==="
          xcodebuild -list -project ARKitPoseStreamer.xcodeproj
          echo
          echo "=== Shared schemes on disk ==="
          ls -la ARKitPoseStreamer.xcodeproj/xcshareddata/xcschemes/ 2>&1 || true

      - name: Build .app (unsigned)
        run: |
          set -o pipefail
          mkdir -p build_logs

          # ── Fix: 'Multiple commands produce Info.plist' ─────────────────
          # The project sets GENERATE_INFOPLIST_FILE=YES (auto-synthesizes
          # Info.plist from INFOPLIST_KEY_* settings) AND uses Xcode 16's
          # PBXFileSystemSynchronizedRootGroup, which auto-copies every file
          # under ARKitPoseStreamer/ as a resource — including the on-disk
          # Info.plist.  That causes two build commands to write the same
          # output.  Solution: remove the on-disk Info.plist in CI and let
          # Xcode synthesize it, supplying the few keys not already covered
          # by INFOPLIST_KEY_* in pbxproj.
          if [ -f ARKitPoseStreamer/Info.plist ]; then
            echo "Removing on-disk Info.plist (Xcode will auto-generate)"
            rm ARKitPoseStreamer/Info.plist
          fi

          COMMON=(
            -project ARKitPoseStreamer.xcodeproj
            -configuration Release
            -sdk iphoneos
            -derivedDataPath build
            IPHONEOS_DEPLOYMENT_TARGET=17.0
            CODE_SIGNING_ALLOWED=NO
            CODE_SIGNING_REQUIRED=NO
            CODE_SIGN_IDENTITY=""
            CODE_SIGN_ENTITLEMENTS=""
            DEVELOPMENT_TEAM=""
            PROVISIONING_PROFILE_SPECIFIER=""
            ONLY_ACTIVE_ARCH=NO
            GENERATE_INFOPLIST_FILE=YES
            INFOPLIST_KEY_UIRequiredDeviceCapabilities=arkit
          )

          SHARED_SCHEMES=$(xcodebuild -list -project ARKitPoseStreamer.xcodeproj \
                            | awk '/Schemes:/{flag=1;next} /^$/{flag=0} flag' \
                            | sed 's/^[[:space:]]*//')
          echo "Schemes detected: [$SHARED_SCHEMES]"

          if echo "$SHARED_SCHEMES" | grep -qx 'ARKitPoseStreamer'; then
            echo ">>> building with -scheme ARKitPoseStreamer"
            xcodebuild "${COMMON[@]}" -scheme ARKitPoseStreamer build 2>&1 | tee build_logs/xcodebuild.log
          else
            echo ">>> no shared scheme found, falling back to -target ARKitPoseStreamer"
            xcodebuild "${COMMON[@]}" -target ARKitPoseStreamer build 2>&1 | tee build_logs/xcodebuild.log
          fi

      - name: Upload build log (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build_logs/
          if-no-files-found: warn
          retention-days: 30

      - name: Package into IPA
        run: |
          set -euo pipefail
          echo "=== Searching for .app under build/ ==="
          find build -maxdepth 8 -name "*.app" -type d | sort
          APP_PATH=$(find build -name "ARKitPoseStreamer.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: ARKitPoseStreamer.app not found"
            echo "=== top of build tree ==="
            find build -maxdepth 5 -type d | head -n 40
            exit 1
          fi
          echo "Found .app at: $APP_PATH"
          rm -rf Payload ARKitPoseStreamer-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -qr ARKitPoseStreamer-unsigned.ipa Payload
          ls -lh ARKitPoseStreamer-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARKitPoseStreamer-unsigned-ipa
          path: ARKitPoseStreamer-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
